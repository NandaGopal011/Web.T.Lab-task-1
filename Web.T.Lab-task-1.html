<!DOCTYPE html>
<html >
<head>
    
    <title>University Admission Form</title>
</head>

<body>

<h1 align="center">University Admission Form</h1>

<form >

    <!-- Personal Information -->
    <fieldset>
        <legend><b>Personal Information</b></legend>

        <label>First Name:</label>
        <input type="text" name="first_name" maxlength="20" required>
        <br><br>

        <label>Last Name:</label>
        <input type="text" name="last_name" maxlength="20" required>
        <br><br>

        <label>Email:</label>
        <input type="email" name="email" required>
        <br><br>

        <label>Date of Birth:</label>
        <input type="date" name="dob" required>
        <br><br>

        <label>Gender:</label>
        <input type="radio" name="gender" value="Male" required> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
    </fieldset>

    <br>

    <!-- Academic Information -->
    <fieldset>
        <legend><b>Academic Information</b></legend>

        <label>Previous GPA:</label>
        <input type="number" name="gpa" step="0.01" min="0" max="5" required>
        <br><br>

        <label>Preferred Department:</label>
        <select name="department" required>
            <option value="">--Select--</option>
            <option value="CSE">CSE</option>
            <option value="EEE">EEE</option>
            <option value="BBA">BBA</option>
            <option value="English">English</option>
        </select>
        <br><br>

        <label>Interests:</label>
        <input type="checkbox" name="interest" value="Programming"> Programming
        <input type="checkbox" name="interest" value="Robotics"> Robotics
        <input type="checkbox" name="interest" value="Business"> Business
        <input type="checkbox" name="interest" value="Literature"> Literature
        <br><br>

        <label>Upload Transcript:</label>
        <input type="file" name="transcript" required>
    </fieldset>

    <br>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>
